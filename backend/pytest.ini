[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
addopts = -q --tb=short
testpaths =
    common
    users
    documents
    frameworks
    assessments
    scoring
    reports
    ingestion
    rag
    llm
    audit_logs
    dashboard
    prompts
    api
