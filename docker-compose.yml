# Local/production-like orchestration for the AI Governance platform backend.
# The React frontend is a static build (see docs/DEPLOYMENT.md) served by any
# static host or CDN; it is intentionally not coupled into this compose file.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: governance
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-governance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      # Override with a strong value: python -c "import secrets;print(secrets.token_urlsafe(64))"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-please-use-a-strong-64-char-secret}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgres://governance:${POSTGRES_PASSWORD:-governance}@db:5432/governance
      ENFORCE_RBAC: ${ENFORCE_RBAC:-true}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media

volumes:
  pgdata:
  media:
